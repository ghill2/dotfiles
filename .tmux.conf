
# -n = bind directly, without leader. Press the key globally.
# -g = Append key to key tables (used for key tables / chains). Rarely needed for normal splits or pane navigation.


unbind C-b # removes default ctrl+b prefix
set-option -g prefix C-a  # set leader key to ctrl-a

# bind reload to ctrl+z then r, leave display-message, working just not highlighted
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

# bind-key h split-window -h  # ctrl+z then h for horizontal split
# bind-key v split-window -v  # ctrl+z then v for vertical split


# Horizontal split with Ctrl+H
bind-key -n C-h split-window -h

# Vertical split with Ctrl+V
bind-key -n C-v split-window -v

# Kill current pane with Ctrl+Q
bind-key -n C-q kill-pane

bind q kill-pane  # kill the current pane

bind-key h select-pane -L  # 
bind-key j select-pane -D  # 
bind-key k select-pane -U  # 
bind-key l select-pane -R  # 

set -g mouse on  # allow resizing panes with the mouse
